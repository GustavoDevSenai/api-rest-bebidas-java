<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cervejaria Artesanal</title>

    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1>Cervejaria Artesanal</h1>

    <nav>
        <a href="#">Início</a>
        <a href="#">Cervejas</a>
        <a href="#">Contato</a>
    </nav>
</header>

<section class="banner">
    <h2>As melhores cervejas da região</h2>
    <p>Produção artesanal com qualidade.</p>
</section>

<section class="produtos">

    <h2>Nossas Cervejas</h2>

    <div class="cards">

        <div class="card" th:each="cerveja : ${cervejas}">
            <h3 th:text="${cerveja}"></h3>
            <p>Cerveja artesanal premium.</p>
            <button>Ver Detalhes</button>
        </div>

    </div>

</section>

<footer>
    <p>© 2026 Cervejaria Artesanal</p>
</footer>

</body>
</html>
